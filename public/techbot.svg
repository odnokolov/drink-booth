<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" aria-hidden="true">
  <defs>
    <linearGradient id="armor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#63d2ff" />
      <stop offset="1" stop-color="#2f6bff" />
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ef0ff" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="mopHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ca3af" />
      <stop offset="1" stop-color="#6b7280" />
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#38bdf8" flood-opacity="0.7" />
    </filter>
  </defs>

  <style>
    .bot {
      transform-box: fill-box;
      transform-origin: center bottom;
      animation: idleBob 2.6s ease-in-out infinite;
    }
    .arm {
      transform-box: view-box;
      transform-origin: 202px 160px;
      animation: mopSwing 2.4s cubic-bezier(0.42, 0, 0.32, 1) infinite;
    }
    .mop {
      transform-box: view-box;
      transform-origin: 218px 188px;
      animation: mopFollow 2.4s cubic-bezier(0.42, 0, 0.32, 1) infinite;
    }
    .blink {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 4.2s steps(1, end) infinite;
    }
    .pulse {
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes idleBob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes mopSwing {
      0%, 100% { transform: rotate(18deg) translate(0px, -1px); }
      25% { transform: rotate(8deg) translate(1px, 0px); }
      50% { transform: rotate(-18deg) translate(4px, 4px); }
      75% { transform: rotate(6deg) translate(1px, 1px); }
    }
    @keyframes mopFollow {
      0%, 100% { transform: rotate(-4deg) translate(0px, 0px); }
      25% { transform: rotate(-1deg) translate(1px, 1px); }
      50% { transform: rotate(10deg) translate(-5px, 5px); }
      75% { transform: rotate(2deg) translate(-2px, 2px); }
    }
    @keyframes blink {
      0%, 89%, 100% { transform: scaleY(1); }
      90%, 92% { transform: scaleY(0.1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
  </style>

  <ellipse cx="170" cy="294" rx="95" ry="14" fill="#0b1530" opacity="0.45" />

  <g class="bot">
    <rect x="142" y="44" width="16" height="16" rx="4" fill="#5eead4" />
    <rect x="138" y="36" width="24" height="10" rx="5" fill="#334155" />
    <circle cx="150" cy="33" r="4" fill="#22d3ee" class="pulse" />

    <rect x="88" y="64" width="124" height="88" rx="24" fill="url(#armor)" stroke="#0f172a" stroke-width="6" />
    <rect x="106" y="80" width="88" height="36" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="3" />

    <g class="blink" filter="url(#glow)">
      <rect x="122" y="92" width="20" height="10" rx="5" fill="url(#visor)" />
      <rect x="158" y="92" width="20" height="10" rx="5" fill="url(#visor)" />
    </g>

    <rect x="112" y="128" width="76" height="12" rx="6" fill="#1e293b" />
    <circle cx="125" cy="134" r="3" fill="#22d3ee" class="pulse" />
    <circle cx="143" cy="134" r="3" fill="#22d3ee" class="pulse" />
    <circle cx="161" cy="134" r="3" fill="#22d3ee" class="pulse" />

    <rect x="96" y="148" width="108" height="88" rx="24" fill="#1d4ed8" stroke="#0f172a" stroke-width="6" />
    <rect x="116" y="168" width="68" height="44" rx="14" fill="#0b1530" stroke="#38bdf8" stroke-width="2.5" />
    <circle cx="130" cy="190" r="4" fill="#22d3ee" class="pulse" />
    <circle cx="150" cy="190" r="4" fill="#22d3ee" class="pulse" />
    <circle cx="170" cy="190" r="4" fill="#22d3ee" class="pulse" />

    <rect x="76" y="158" width="24" height="62" rx="12" fill="#334155" />
    <rect x="66" y="198" width="38" height="20" rx="10" fill="#475569" />

    <g class="arm">
      <circle cx="202" cy="160" r="10" fill="#475569" />
      <rect x="192" y="154" width="22" height="52" rx="11" fill="#334155" />
      <rect x="214" y="186" width="12" height="72" rx="6" fill="#9ca3af" />
      <g class="mop">
        <rect x="182" y="252" width="68" height="10" rx="5" fill="url(#mopHead)" />
        <path d="M184 262 L248 262 L242 277 L190 277 Z" fill="#60a5fa" opacity="0.85" />
      </g>
    </g>

    <rect x="106" y="228" width="22" height="38" rx="10" fill="#334155" />
    <rect x="172" y="228" width="22" height="38" rx="10" fill="#334155" />
    <ellipse cx="117" cy="272" rx="26" ry="14" fill="#1e293b" />
    <ellipse cx="183" cy="272" rx="26" ry="14" fill="#1e293b" />
    <circle cx="117" cy="272" r="7" fill="#22d3ee" class="pulse" />
    <circle cx="183" cy="272" r="7" fill="#22d3ee" class="pulse" />
  </g>
</svg>
